<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
<title>노형 배송 동선 - 3단계</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; height: 100vh; overflow: hidden; }
  
  /* 헤더 */
  #header {
    background: #2c5f8d; color: white; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    height: 48px; flex-shrink: 0;
  }
  #header h1 { font-size: 15px; flex: 1; }
  #header .stats { font-size: 12px; opacity: 0.9; }
  #btnToggleSidebar {
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer;
    font-size: 12px;
  }
  
  /* 메인 레이아웃 */
  #main {
    display: flex; height: calc(100vh - 48px);
  }
  
  /* 사이드바 */
  #sidebar {
    width: 320px; background: #fafafa; border-right: 1px solid #ddd;
    display: flex; flex-direction: column;
    transition: margin-left 0.3s;
  }
  #sidebar.collapsed { margin-left: -320px; }
  
  #sidebarTop {
    padding: 10px; border-bottom: 1px solid #ddd; background: white;
    display: flex; flex-direction: column; gap: 8px;
  }
  .search-group {
    display: flex; flex-direction: column; gap: 4px;
  }
  .search-label {
    font-size: 11px; color: #666; font-weight: 500;
  }
  #mapSearch {
    width: 100%; padding: 7px 10px; border: 1px solid #2c5f8d;
    border-radius: 4px; font-size: 13px;
  }
  #searchBox {
    width: 100%; padding: 7px 10px; border: 1px solid #ccc;
    border-radius: 4px; font-size: 13px;
  }
  .toolbar { display: flex; gap: 6px; flex-wrap: wrap; }
  .toolbar button {
    padding: 6px 10px; font-size: 12px; border: none;
    border-radius: 4px; cursor: pointer; flex: 1;
  }
  .btn-add { background: #2c5f8d; color: white; }
  .btn-add.active { background: #d9534f; }
  .btn-export { background: #5cb85c; color: white; }
  .btn-import { background: #f0ad4e; color: white; }
  .btn-clear { background: #d9534f; color: white; }
  
  /* 명단 리스트 */
  #addrList {
    flex: 1; overflow-y: auto; padding: 4px;
  }
  .addr-item {
    background: white; margin-bottom: 4px; padding: 8px 10px;
    border-radius: 4px; border: 1px solid #e0e0e0;
    cursor: pointer; font-size: 12px; line-height: 1.4;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.15s;
  }
  .addr-item:hover { background: #f0f7ff; border-color: #2c5f8d; }
  .addr-item.active { background: #fff3cd; border-color: #f0ad4e; }
  .addr-item.done { background: #f0fff0; border-color: #5cb85c; }
  
  .addr-num {
    background: #6c757d; color: white;
    min-width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 11px; flex-shrink: 0;
  }
  .addr-item.done .addr-num { background: #5cb85c; }
  .addr-item.active .addr-num { background: #f0ad4e; }
  
  .addr-text { flex: 1; min-width: 0; }
  .addr-road { font-weight: 600; color: #333; }
  .addr-detail { color: #666; font-size: 11px; }
  .addr-name { color: #2c5f8d; font-size: 11px; margin-top: 2px; font-style: italic; }
  
  .addr-actions { display: flex; gap: 4px; }
  .addr-btn {
    background: #2c5f8d; color: white; border: none;
    padding: 4px 8px; border-radius: 3px; font-size: 11px;
    cursor: pointer;
  }
  .addr-btn:hover { background: #1e4663; }
  .addr-btn.del { background: #d9534f; }
  
  /* 지도 */
  #mapWrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  
  /* 핀 라벨 */
  .pin-label {
    background: #d9534f; color: white;
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 13px;
    border: 3px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .pin-label.done { background: #5cb85c; }
  
  /* 모드 안내 */
  #modeBanner {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%);
    background: #f0ad4e; color: white;
    padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    display: none; z-index: 100;
  }
  #modeBanner.show { display: block; }
  
  /* 모달 (핀 정보 편집) */
  #modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); display: none;
    align-items: center; justify-content: center; z-index: 1000;
  }
  #modal.show { display: flex; }
  .modal-content {
    background: white; border-radius: 8px; padding: 20px;
    width: 90%; max-width: 420px; max-height: 90vh; overflow-y: auto;
  }
  .modal-content h3 {
    margin-bottom: 12px; color: #2c5f8d; font-size: 16px;
  }
  .modal-content label {
    display: block; font-size: 12px; color: #666;
    margin-bottom: 4px; margin-top: 10px;
  }
  .modal-content input, .modal-content textarea {
    width: 100%; padding: 8px 10px; font-size: 13px;
    border: 1px solid #ccc; border-radius: 4px;
    font-family: inherit;
  }
  .modal-content textarea { min-height: 100px; resize: vertical; }
  .modal-content .addr-info {
    background: #f5f5f5; padding: 8px 12px; border-radius: 4px;
    font-size: 13px; color: #555; margin-top: 4px;
  }
  .modal-buttons {
    display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;
  }
  .modal-buttons button {
    padding: 8px 16px; border: none; border-radius: 4px;
    cursor: pointer; font-size: 13px;
  }
  .btn-save { background: #5cb85c; color: white; }
  .btn-cancel { background: #ccc; }
  .btn-delete { background: #d9534f; color: white; margin-right: auto; }
  
  /* 모바일 */
  @media (max-width: 768px) {
    #sidebar { 
      position: absolute; left: 0; top: 0; bottom: 0; z-index: 50;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      margin-left: -320px; /* 모바일 기본 닫힘 */
    }
    #sidebar.open { margin-left: 0; }
    
    /* 모바일에서 사이드바 오버레이 배경 */
    #sidebarOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 49;
    }
    #sidebarOverlay.show { display: block; }
  }
</style>
</head>
<body>

<div id="header">
  <button id="btnToggleSidebar">☰</button>
  <h1>🚚 노형 배송 동선</h1>
  <span class="stats">완료 <b id="doneCount">0</b>/76</span>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebarTop">
      <div class="search-group">
        <label class="search-label">🔍 주소 검색 (지도 이동)</label>
        <input type="text" id="mapSearch" placeholder="예: 도령로127-1">
      </div>
      <div class="search-group">
        <label class="search-label">📋 명단 필터</label>
        <input type="text" id="searchBox" placeholder="예: 정든마을">
      </div>
      <div class="toolbar">
        <button class="btn-export" id="btnExport">📤 내보내기</button>
        <button class="btn-import" id="btnImport">📥 불러오기</button>
        <button class="btn-clear" id="btnClearAll">🗑️ 초기화</button>
      </div>
    </div>
    <div id="addrList"></div>
  </div>
  
  <div id="mapWrap">
    <div id="map"></div>
    <div id="modeBanner">📍 지도를 클릭해서 핀을 찍으세요 (ESC로 취소)</div>
  </div>
</div>

<!-- 모바일 오버레이 -->
<div id="sidebarOverlay"></div>

<!-- 모달 -->
<div id="modal">
  <div class="modal-content">
    <h3 id="modalTitle">핀 정보</h3>
    <div class="addr-info" id="modalAddr"></div>
    
    <label for="modalName">핀 이름 (지도에서 호버 시 표시)</label>
    <input type="text" id="modalName" placeholder="예: 해든빌-701">
    
    <label for="modalMemo">세부 메모 (비번, 출입 방법, 특이사항 등)</label>
    <textarea id="modalMemo" placeholder="예: 비번 1234# / 문 앞 비닐 X / 월2목1"></textarea>
    
    <div class="modal-buttons">
      <button class="btn-delete" id="btnPinDelete">🗑️ 핀 삭제</button>
      <button class="btn-cancel" id="btnModalCancel">취소</button>
      <button class="btn-save" id="btnModalSave">💾 저장</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none">

<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=svwz8aul2j&submodules=drawing"></script>

  {n:57, road:"우평로47-1", detail:"(제주자원)"},

  {n:59, road:"진군길56-11", detail:"대규원룸201호"},

  {n:68, road:"국기중길16", detail:"1층, 인비토미용실"},
  {n:69, road:"국기로3길5-7", detail:"401호"},
  {n:70, road:"과원로118", detail:"아델리움102-201"},
  {n:71, road:"과원로118", detail:"아델리움106-102"},
  {n:72, road:"연북로106", detail:"트리플시티102-407"},
  {n:73, road:"연북로66", detail:"에코파인-601"},
  {n:74, road:"원노형로90", detail:"아이파크1차@101-1506"},
  {n:75, road:"연북로8", detail:"에이스텔-301"},
  {n:76, road:"노형11길5-6", detail:"6층"},

const STORAGE_KEY = 'nohyeong_delivery_v1';

// ========== 상태 ==========
let map;
let pinsData = {};      // {1: {lat, lng, name, memo}, ...}
let markers = {};       // {1: marker, ...}
let polyline = null;
let pendingPinNum = null;  // 핀 찍기 대기 중인 번호
let editingPinNum = null;  // 모달에서 편집 중인 번호

// ========== 저장/복원 ==========
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pinsData));
  } catch(e) { console.error('저장 실패', e); }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) pinsData = JSON.parse(raw);
  } catch(e) { console.error('복원 실패', e); pinsData = {}; }
}

// ========== 지도 초기화 ==========
function initMap() {
  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(33.4890, 126.4790),
    zoom: 15,
    mapTypeControl: false,
    zoomControl: true,
    zoomControlOptions: {
      style: naver.maps.ZoomControlStyle.SMALL,
      position: naver.maps.Position.RIGHT_CENTER
    }
  });
  
  naver.maps.Event.addListener(map, 'click', function(e) {
    if (pendingPinNum !== null) {
      placePin(pendingPinNum, e.coord);
      pendingPinNum = null;
      hideModeBanner();
      renderList();
    }
  });
  
  // 저장된 핀 복원
  Object.keys(pinsData).forEach(num => {
    const d = pinsData[num];
    createMarker(parseInt(num), new naver.maps.LatLng(d.lat, d.lng));
  });
  redrawPolyline();
}

// ========== 핀 배치 ==========
function placePin(num, latlng) {
  if (!pinsData[num]) {
    const a = ADDRESSES.find(x => x.n === num);
    pinsData[num] = {
      lat: latlng.y,
      lng: latlng.x,
      name: a ? a.detail : '',
      memo: ''
    };
  } else {
    pinsData[num].lat = latlng.y;
    pinsData[num].lng = latlng.x;
  }
  
  if (markers[num]) markers[num].setMap(null);
  createMarker(num, latlng);
  redrawPolyline();
  saveData();
  updateStats();
}

function createMarker(num, latlng) {
  const marker = new naver.maps.Marker({
    position: latlng,
    map: map,
    icon: {
      content: `<div class="pin-label">${num}</div>`,
      anchor: new naver.maps.Point(15, 15)
    },
    draggable: true,
    title: pinsData[num] ? pinsData[num].name || `${num}번 핀` : `${num}번 핀`
  });
  
  naver.maps.Event.addListener(marker, 'click', function() {
    openModal(num);
  });
  
  naver.maps.Event.addListener(marker, 'dragend', function() {
    const pos = marker.getPosition();
    pinsData[num].lat = pos.y;
    pinsData[num].lng = pos.x;
    saveData();
    redrawPolyline();
  });
  
  markers[num] = marker;
}

// ========== 동선 ==========
let routePoints = [];  // 경로점 저장 (핀 사이 중간점)

function redrawPolyline() {
  if (polyline) polyline.setMap(null);
  
  const sortedNums = Object.keys(pinsData)
    .map(Number)
    .sort((a, b) => a - b);
  
  if (sortedNums.length < 2) {
    polyline = null;
    return;
  }
  
  // 핀 좌표 + 경로점 조합
  const path = [];
  for (let i = 0; i < sortedNums.length; i++) {
    const num = sortedNums[i];
    path.push(new naver.maps.LatLng(pinsData[num].lat, pinsData[num].lng));
    
    // 다음 핀으로 가는 중간 경로점들 추가
    if (i < sortedNums.length - 1) {
      const nextNum = sortedNums[i + 1];
      const key = `${num}-${nextNum}`;
      if (routePoints[key]) {
        routePoints[key].forEach(pt => {
          path.push(new naver.maps.LatLng(pt.lat, pt.lng));
        });
      }
    }
  }
  
  polyline = new naver.maps.Polyline({
    map: map,
    path: path,
    strokeColor: '#2c5f8d',
    strokeWeight: 4,
    strokeOpacity: 0.7,
    strokeStyle: 'solid',
    clickable: true
  });
  
  // 동선 클릭으로 경로점 추가
  naver.maps.Event.addListener(polyline, 'click', function(e) {
    addRoutePoint(e.coord);
  });
}

// 경로점 추가 (동선 위 클릭한 곳에 중간점 추가)
function addRoutePoint(latlng) {
  if (Object.keys(pinsData).length < 2) return;
  
  // 가장 가까운 두 핀 찾기
  const sorted = Object.keys(pinsData).map(Number).sort((a,b) => a-b);
  let closestPair = null;
  let minDist = Infinity;
  
  for (let i = 0; i < sorted.length - 1; i++) {
    const p1 = new naver.maps.LatLng(pinsData[sorted[i]].lat, pinsData[sorted[i]].lng);
    const p2 = new naver.maps.LatLng(pinsData[sorted[i+1]].lat, pinsData[sorted[i+1]].lng);
    const dist = distanceToSegment(latlng, p1, p2);
    if (dist < minDist) {
      minDist = dist;
      closestPair = [sorted[i], sorted[i+1]];
    }
  }
  
  if (closestPair && minDist < 0.01) {  // 충분히 가까운 경우만
    const key = `${closestPair[0]}-${closestPair[1]}`;
    if (!routePoints[key]) routePoints[key] = [];
    routePoints[key].push({ lat: latlng.y, lng: latlng.x });
    saveRoutePoints();
    redrawPolyline();
  }
}

// 점과 선분 사이 거리 계산 (간단한 유클리드 거리)
function distanceToSegment(pt, p1, p2) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  if (dx === 0 && dy === 0) return Math.hypot(pt.x - p1.x, pt.y - p1.y);
  const t = Math.max(0, Math.min(1, ((pt.x - p1.x) * dx + (pt.y - p1.y) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(pt.x - (p1.x + t * dx), pt.y - (p1.y + t * dy));
}

function saveRoutePoints() {
  try {
    localStorage.setItem('nohyeong_route_v1', JSON.stringify(routePoints));
  } catch(e) { console.error('경로점 저장 실패', e); }
}

function loadRoutePoints() {
  try {
    const raw = localStorage.getItem('nohyeong_route_v1');
    if (raw) routePoints = JSON.parse(raw);
  } catch(e) { console.error('경로점 복원 실패', e); routePoints = []; }
}

// ========== 사이드바 리스트 ==========
function renderList() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const list = document.getElementById('addrList');
  list.innerHTML = '';
  
  ADDRESSES.forEach(a => {
    const has = !!pinsData[a.n];
    const text = `${a.n} ${a.road} ${a.detail}`.toLowerCase();
    if (search && !text.includes(search)) return;
    
    const item = document.createElement('div');
    item.className = 'addr-item';
    if (has) item.classList.add('done');
    if (pendingPinNum === a.n) item.classList.add('active');
    
    const customName = has ? pinsData[a.n].name : '';
    const showCustom = customName && customName !== a.detail;
    
    item.innerHTML = `
      <div class="addr-num">${a.n}</div>
      <div class="addr-text">
        <div class="addr-road">${a.road}</div>
        <div class="addr-detail">${a.detail || '<i style="color:#aaa">세부주소 없음</i>'}</div>
        ${showCustom ? `<div class="addr-name">📝 ${customName}</div>` : ''}
      </div>
      <div class="addr-actions">
        ${has 
          ? `<button class="addr-btn" onclick="event.stopPropagation();focusPin(${a.n})">보기</button>
             <button class="addr-btn del" onclick="event.stopPropagation();deletePin(${a.n})">×</button>`
          : `<button class="addr-btn" onclick="event.stopPropagation();startPlacing(${a.n})">📍 찍기</button>`
        }
      </div>
    `;
    
    item.addEventListener('click', () => {
      if (has) {
        focusPin(a.n);
      } else {
        startPlacing(a.n);
      }
    });
    
    list.appendChild(item);
  });
}

function startPlacing(num) {
  pendingPinNum = num;
  showModeBanner(num);
  renderList();
}

function focusPin(num) {
  if (!pinsData[num]) return;
  const pos = new naver.maps.LatLng(pinsData[num].lat, pinsData[num].lng);
  map.setCenter(pos);
  map.setZoom(17);
  setTimeout(() => openModal(num), 300);
}

function deletePin(num) {
  if (!confirm(`${num}번 핀을 삭제할까요?`)) return;
  if (markers[num]) markers[num].setMap(null);
  delete markers[num];
  delete pinsData[num];
  saveData();
  redrawPolyline();
  renderList();
  updateStats();
}

// ========== 모드 배너 ==========
function showModeBanner(num) {
  const a = ADDRESSES.find(x => x.n === num);
  const b = document.getElementById('modeBanner');
  b.textContent = `📍 ${num}번 (${a.road} ${a.detail}) - 지도를 클릭하세요 (ESC 취소)`;
  b.classList.add('show');
}

function hideModeBanner() {
  document.getElementById('modeBanner').classList.remove('show');
}

// ========== 모달 ==========
function openModal(num) {
  if (!pinsData[num]) return;
  editingPinNum = num;
  const a = ADDRESSES.find(x => x.n === num);
  document.getElementById('modalTitle').textContent = `📍 ${num}번 핀`;
  document.getElementById('modalAddr').textContent = `${a.road} ${a.detail || ''}`;
  document.getElementById('modalName').value = pinsData[num].name || '';
  document.getElementById('modalMemo').value = pinsData[num].memo || '';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingPinNum = null;
}

function saveModal() {
  if (editingPinNum === null) return;
  pinsData[editingPinNum].name = document.getElementById('modalName').value.trim();
  pinsData[editingPinNum].memo = document.getElementById('modalMemo').value.trim();
  
  // 마커 title 업데이트 (호버 시 표시)
  if (markers[editingPinNum]) {
    markers[editingPinNum].setTitle(
      pinsData[editingPinNum].name || `${editingPinNum}번 핀`
    );
  }
  
  saveData();
  closeModal();
  renderList();
}

// ========== 통계 ==========
function updateStats() {
  document.getElementById('doneCount').textContent = Object.keys(pinsData).length;
}

// ========== 내보내기/불러오기 ==========
function exportData() {
  const data = {
    version: 2,
    exported_at: new Date().toISOString(),
    pins: pinsData,
    routePoints: routePoints
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `노형배송_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.pins) throw new Error('잘못된 파일');
      if (!confirm(`${Object.keys(data.pins).length}개의 핀을 불러옵니다. 현재 데이터는 덮어쓰기 됩니다. 계속할까요?`)) return;
      
      // 기존 마커 삭제
      Object.values(markers).forEach(m => m.setMap(null));
      markers = {};
      if (polyline) { polyline.setMap(null); polyline = null; }
      
      // 새 데이터 적용
      pinsData = data.pins;
      routePoints = data.routePoints || [];
      Object.keys(pinsData).forEach(num => {
        const d = pinsData[num];
        createMarker(parseInt(num), new naver.maps.LatLng(d.lat, d.lng));
      });
      redrawPolyline();
      saveData();
      saveRoutePoints();
      renderList();
      updateStats();
      alert('불러오기 완료!');
    } catch(err) {
      alert('파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function clearAll() {
  if (!confirm('모든 핀과 메모를 삭제할까요?\n(JSON 백업 후 진행 권장)')) return;
  if (!confirm('정말로 모두 삭제합니다. 되돌릴 수 없습니다.')) return;
  
  Object.values(markers).forEach(m => m.setMap(null));
  markers = {};
  if (polyline) { polyline.setMap(null); polyline = null; }
  pinsData = {};
  routePoints = [];
  saveData();
  saveRoutePoints();
  renderList();
  updateStats();
}

// ========== 주소 검색 (지도 이동) ==========
function searchAddress(query) {
  if (!query.trim()) return;
  
  // 제주시를 붙여서 검색
  const fullAddress = `제주특별자치도 제주시 ${query.trim()}`;
  
  naver.maps.Service.geocode({
    query: fullAddress
  }, function(status, response) {
    if (status !== naver.maps.Service.Status.OK) {
      alert('주소를 찾을 수 없습니다. 정확한 도로명 주소를 입력하세요.');
      return;
    }
    
    const result = response.v2.addresses[0];
    if (result) {
      const latlng = new naver.maps.LatLng(result.y, result.x);
      map.setCenter(latlng);
      map.setZoom(17);
    } else {
      alert('주소를 찾을 수 없습니다.');
    }
  });
}

// ========== 이벤트 ==========
document.getElementById('btnToggleSidebar').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isMobile = window.innerWidth <= 768;
  
  if (isMobile) {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  } else {
    sidebar.classList.toggle('collapsed');
  }
});

// 모바일 오버레이 클릭 시 사이드바 닫기
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
});

// 주소 검색 (엔터 키)
document.getElementById('mapSearch').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    searchAddress(e.target.value);
  }
});

document.getElementById('searchBox').addEventListener('input', renderList);

document.getElementById('btnExport').addEventListener('click', exportData);

document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', (e) => {
  if (e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
});

document.getElementById('btnClearAll').addEventListener('click', clearAll);

document.getElementById('btnModalSave').addEventListener('click', saveModal);
document.getElementById('btnModalCancel').addEventListener('click', closeModal);
document.getElementById('btnPinDelete').addEventListener('click', () => {
  if (editingPinNum === null) return;
  const num = editingPinNum;
  closeModal();
  deletePin(num);
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (pendingPinNum !== null) {
      pendingPinNum = null;
      hideModeBanner();
      renderList();
    } else if (document.getElementById('modal').classList.contains('show')) {
      closeModal();
    }
  }
});

// ========== 초기화 ==========
loadData();
loadRoutePoints();
renderList();
updateStats();

if (typeof naver !== 'undefined' && naver.maps) {
  initMap();
} else {
  window.addEventListener('load', initMap);
}
</script>

</body>
</html>
