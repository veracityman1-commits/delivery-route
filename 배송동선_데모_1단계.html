<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배송 동선 그리기 - 1단계 데모</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  
  #header {
    background: #2c5f8d; color: white; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  #header h1 { font-size: 16px; }
  #header .status { font-size: 13px; opacity: 0.9; }
  
  #controls {
    background: #f5f5f5; padding: 10px 16px; border-bottom: 1px solid #ddd;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  button {
    padding: 8px 14px; border: none; border-radius: 4px;
    font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn-primary { background: #2c5f8d; color: white; }
  .btn-primary:hover { background: #1e4663; }
  .btn-primary.active { background: #d9534f; }
  .btn-secondary { background: #6c757d; color: white; }
  .btn-secondary:hover { background: #5a6268; }
  .btn-danger { background: #d9534f; color: white; }
  .btn-danger:hover { background: #c9302c; }
  
  #info {
    font-size: 13px; color: #555; margin-left: auto;
  }
  
  #map { flex: 1; width: 100%; }
  
  .pin-label {
    background: #d9534f; color: white;
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 14px;
    border: 3px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div id="header">
  <h1>🚚 배송 동선 그리기 - 1단계 데모</h1>
  <span class="status" id="statusText">테스트: 핀 5개 찍어보기</span>
</div>

<div id="controls">
  <button id="btnAddPin" class="btn-primary">📍 핀 찍기 모드</button>
  <button id="btnUndo" class="btn-secondary">↶ 마지막 핀 취소</button>
  <button id="btnClear" class="btn-danger">🗑️ 전체 삭제</button>
  <span id="info">핀: <b id="pinCount">0</b>개</span>
</div>

<div id="map"></div>

<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=svwz8aul2j&submodules=drawing"></script>

<script>
let map;
let markers = [];           // 마커 객체 배열
let polyline = null;        // 동선 폴리라인
let isAddMode = false;      // 핀 찍기 모드 여부

// 지도 초기화 - 제주시 노형동 중심
function initMap() {
  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(33.4890, 126.4790),
    zoom: 15,
    mapTypeControl: true,
    zoomControl: true,
    zoomControlOptions: {
      style: naver.maps.ZoomControlStyle.SMALL,
      position: naver.maps.Position.RIGHT_CENTER
    }
  });
  
  // 지도 클릭 이벤트
  naver.maps.Event.addListener(map, 'click', function(e) {
    if (isAddMode) {
      addPin(e.coord);
    }
  });
  
  // LocalStorage에서 복원
  loadFromStorage();
}

// 핀 추가
function addPin(latlng) {
  const num = markers.length + 1;
  
  // 번호가 표시된 마커
  const marker = new naver.maps.Marker({
    position: latlng,
    map: map,
    icon: {
      content: `<div class="pin-label">${num}</div>`,
      anchor: new naver.maps.Point(15, 15)
    },
    draggable: true  // 드래그로 위치 수정 가능
  });
  
  // 드래그 끝나면 동선 다시 그리기
  naver.maps.Event.addListener(marker, 'dragend', function() {
    redrawPolyline();
    saveToStorage();
  });
  
  markers.push(marker);
  redrawPolyline();
  updateInfo();
  saveToStorage();
}

// 동선 다시 그리기
function redrawPolyline() {
  if (polyline) {
    polyline.setMap(null);
  }
  
  if (markers.length < 2) {
    polyline = null;
    return;
  }
  
  const path = markers.map(m => m.getPosition());
  
  polyline = new naver.maps.Polyline({
    map: map,
    path: path,
    strokeColor: '#2c5f8d',
    strokeWeight: 4,
    strokeOpacity: 0.8,
    strokeStyle: 'solid'
  });
}

// 마지막 핀 제거
function undoPin() {
  if (markers.length === 0) return;
  
  const last = markers.pop();
  last.setMap(null);
  redrawPolyline();
  updateInfo();
  saveToStorage();
}

// 전체 삭제
function clearAll() {
  if (markers.length === 0) return;
  if (!confirm('모든 핀과 동선을 삭제할까요?')) return;
  
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (polyline) {
    polyline.setMap(null);
    polyline = null;
  }
  updateInfo();
  saveToStorage();
}

// 정보 업데이트
function updateInfo() {
  document.getElementById('pinCount').textContent = markers.length;
  
  const status = document.getElementById('statusText');
  if (markers.length === 0) {
    status.textContent = '핀 찍기 모드를 켜고 지도를 클릭하세요';
  } else if (markers.length < 5) {
    status.textContent = `${markers.length}/5 - 계속 찍어보세요`;
  } else {
    status.textContent = `✅ ${markers.length}개 핀 - 동선이 그려졌습니다!`;
  }
}

// LocalStorage 저장
function saveToStorage() {
  const data = markers.map(m => {
    const pos = m.getPosition();
    return { lat: pos.y, lng: pos.x };
  });
  try {
    localStorage.setItem('delivery_demo_pins', JSON.stringify(data));
  } catch(e) {
    console.warn('저장 실패:', e);
  }
}

// LocalStorage 복원
function loadFromStorage() {
  try {
    const raw = localStorage.getItem('delivery_demo_pins');
    if (!raw) return;
    
    const data = JSON.parse(raw);
    data.forEach(p => {
      addPinSilent(new naver.maps.LatLng(p.lat, p.lng));
    });
    redrawPolyline();
    updateInfo();
  } catch(e) {
    console.warn('복원 실패:', e);
  }
}

// 저장 트리거 없이 핀 추가 (복원용)
function addPinSilent(latlng) {
  const num = markers.length + 1;
  const marker = new naver.maps.Marker({
    position: latlng,
    map: map,
    icon: {
      content: `<div class="pin-label">${num}</div>`,
      anchor: new naver.maps.Point(15, 15)
    },
    draggable: true
  });
  
  naver.maps.Event.addListener(marker, 'dragend', function() {
    redrawPolyline();
    saveToStorage();
  });
  
  markers.push(marker);
}

// 버튼 이벤트
document.getElementById('btnAddPin').addEventListener('click', function() {
  isAddMode = !isAddMode;
  this.classList.toggle('active');
  this.textContent = isAddMode ? '✅ 핀 찍기 ON (지도 클릭)' : '📍 핀 찍기 모드';
  document.getElementById('map').style.cursor = isAddMode ? 'crosshair' : '';
});

document.getElementById('btnUndo').addEventListener('click', undoPin);
document.getElementById('btnClear').addEventListener('click', clearAll);

// 지도 로드 대기
if (typeof naver !== 'undefined' && naver.maps) {
  initMap();
} else {
  window.addEventListener('load', initMap);
}
</script>

</body>
</html>
